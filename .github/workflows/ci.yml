name: CI/CD Pipeline

on:
  push:
    branches:
      ["master"]
  pull_request:
    branches:
      ["master"]

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run Tests with Maven
        run: ./mvnw -B -ntp -T 1C test jacoco:check -Dmaven.test.failure.ignore=true

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always() # Faz upload do relatório mesmo se alguns testes falharem
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
