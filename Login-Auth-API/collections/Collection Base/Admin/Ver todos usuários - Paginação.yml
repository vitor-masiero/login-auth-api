info:
  name: Ver todos usuários - Paginação
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}/admin/users?page=0&size=10"
  params:
    - name: page
      value: "0"
      type: query
    - name: size
      value: "10"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const users = res.getBody();

        if (Array.isArray(users) && users.length > 0) {
          const lastUser = users[users.length - 1];
          bru.setVar("id_user_teste", lastUser.id);
          
          console.log("ID do último usuário salvo: " + lastUser.id);
        } else {
          console.log("A resposta não é um array ou está vazia.");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
