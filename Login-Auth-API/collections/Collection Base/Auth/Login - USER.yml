runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const data = res.getBody();
         
          if (data.token) {
            bru.setVar("token", data.token);
            console.log("Token salvo com sucesso!");
          }
        }

