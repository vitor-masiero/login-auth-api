info:
  name: Register - USER
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseURL}}/auth/register"
  body:
    type: json
    data: |-
      {
        "nome": "José Masiero",
        "email": "usuario@gmail.com",
        "telefone": "11999999999",
        "endereco": "Rua das Flores, 123",
        "senha": "senhadeusuario123",
        "role": "USER"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          const data = res.getBody();
         
          if (data.token) {
            bru.setVar("token", data.token);
            console.log("Token salvo com sucesso!");
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
